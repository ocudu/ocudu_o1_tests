services:

  netconf:
    image: ocudu/netconf:latest
    build:
      context: ocudu_elements/ocudu_netconf
      dockerfile: Dockerfile
    # NETCONF_ARGS is injected by run_tests.py per run, e.g.
    #   --config gnb
    #   --config du --custom-config /config/default_config_1.xml
    entrypoint: ["sh", "-c"]
    command: ["exec /usr/local/bin/entrypoint.sh ${NETCONF_ARGS:---config gnb}"]
    container_name: ocudu-netconf
    ports:
      # Comment to hide netconf port from outside of the docker network
      - 830:830
      - 6513:6513
    volumes:
      # Per-profile configs dir mounted read-only; the bundled run ignores it,
      # custom runs reference files via --custom-config /config/<file>.xml.
      - ${NETCONF_CONFIGS_DIR:-${PWD}/tests/configs/gnb}:/config:ro
      # Named volume for TLS material. With --enable-tls, setup_tls.sh self-signs
      # a CA + server + client cert into here on first start (if empty); production
      # deployments override this mount with their own ca.crt/server.{crt,key}.
      - netconf-tls-certs:/etc/netconf-tls
    networks:
      smo:
        ipv4_address: 172.21.0.14

  mock_ru:
    image: ocudu/netconf:latest
    build:
      context: ocudu_elements/ocudu_netconf
      dockerfile: Dockerfile
    entrypoint: ["sh", "-c"]
    command: ["exec /usr/local/bin/entrypoint.sh --config ru --enable-tls"]
    container_name: ocudu-mock-ru
    ports:
      - 16513:6513
    volumes:
      - mock-ru-tls-certs:/etc/netconf-tls
    networks:
      smo:
        ipv4_address: 172.21.0.17
    profiles: ["test", "dev"]

  o1_adapter:
    image: ocudu/o1_adapter:latest
    build:
      context: ocudu_elements/ocudu_o1_adapter
      dockerfile: Dockerfile
    container_name: ocudu-o1-adapter
    ports:
      - 5000:5000
    tty: true
    # O1_ADAPTER_PROFILE is injected by run_tests.py per profile (gnb|cu|cucp|cuup|du).
    entrypoint: ["sh", "-c"]
    command:
      - "exec python3 ./src/o1_adapter.py --netconf_host 172.21.0.14 --ws_host ocudu-mock-gnb --ws_port 8001 --profile ${O1_ADAPTER_PROFILE:-gnb}"
    healthcheck:
      test: python3 -c "import urllib.request; urllib.request.urlopen('http://localhost:5000/status')"
      interval: 10s
      timeout: 1s
      retries: 60
    depends_on:
      netconf:
        condition: service_started
      mock_gnb:
        condition: service_started
      mock_smo:
        condition: service_started
    environment:
      WS_HOST: ${O1_ADAPTER_WS_HOST:-ocudu-mock-gnb}
      WS_PORT: ${O1_ADAPTER_WS_PORT:-8001}
      O1_ADAPTER_LOGLEVEL: DEBUG
    volumes:
      # Save generated config file to /tmp/config.yml and make it available to the test container
      - shared-data:/tmp
    networks:
      smo:
        ipv4_address: 172.21.0.13
    profiles: ["test", "dev"]

  mock_gnb:
    image: ocudu/mock-gnb:latest
    build:
      context: ./mocks/mock_gnb
      dockerfile: Dockerfile
    container_name: ocudu-mock-gnb
    #ports:
      # Comment to hide the WS port from outside of the docker network
      #- 8001:8001
    environment:
      #MOCK_GNB_HOST: "172.21.0.16"
      MOCK_GNB_PORT: "8001"
      MOCK_GNB_EVENT_LOG: /tmp/mock_gnb_events.jsonl
      MOCK_GNB_LOGLEVEL: INFO
    networks:
      smo:
        ipv4_address: 172.21.0.16
    profiles: ["test", "dev"]
    volumes:
      - shared-data:/tmp
    restart: always # The quit command in the test will stop the container, but we want it to be restarted.
    healthcheck:
      test: python -c "import urllib.request; urllib.request.urlopen('http://172.21.0.13:5000/config-healthy')"
      interval: 10s
      timeout: 1s
      retries: 1

  mock_smo:
    image: ocudu/mock-smo:latest
    build:
      context: ./mocks/mock_smo
      dockerfile: Dockerfile
    container_name: ocudu-mock-smo
    environment:
      MOCK_SMO_PORT: "9560"
      MOCK_SMO_EVENT_LOG: /tmp/mock_smo_events.jsonl
      MOCK_SMO_TRIGGER_AFTER: ${MOCK_SMO_TRIGGER_AFTER:-3}
      MOCK_SMO_EDIT_PAYLOAD_FILE: ${MOCK_SMO_EDIT_PAYLOAD_FILE:-}
      MOCK_SMO_LOGLEVEL: INFO
      NETCONF_HOST: ocudu-netconf
      NETCONF_PORT: "830"
      NETCONF_USERNAME: root
      NETCONF_PASSWORD: root
    depends_on:
      netconf:
        condition: service_started
    networks:
      smo:
        ipv4_address: 172.21.0.18
    profiles: ["test", "dev"]
    volumes:
      - shared-data:/tmp

  yaml_validator:
    image: registry.gitlab.com/ocudu/ocudu/ocudu_nightly_avx2:latest
    container_name: ocudu-yaml-validator
    entrypoint: ["/bin/sh", "/opt/yaml_validator/dryrun.sh"]
    network_mode: "none"
    cap_add:
      - IPC_LOCK
      - SYS_NICE
    environment:
      O1_ADAPTER_PROFILE: ${O1_ADAPTER_PROFILE:-gnb}
    volumes:
      - shared-data:/tmp
      - ./mocks/yaml_validator/dryrun.sh:/opt/yaml_validator/dryrun.sh:ro
    profiles: ["test"]

  o1_tests:
    image: ocudu/o1_tests:latest
    build:
      context: tests
      dockerfile: Dockerfile
    container_name: ocudu-o1-tests
    depends_on:
      netconf:
        condition: service_started
      mock_gnb:
        condition: service_started
      mock_ru:
        condition: service_started
      yaml_validator:
        condition: service_started
      o1_adapter:
        condition: service_healthy
      mock_smo:
        condition: service_started
    environment:
      NETCONF_HOST: ocudu-netconf
      NETCONF_PORT: "830"
      NETCONF_USERNAME: root
      NETCONF_PASSWORD: root
      NETCONF_TLS_PORT: "6513"
      NETCONF_TLS_CERT_DIR: /etc/netconf-tls-client
      MOCK_RU_HOST: ocudu-mock-ru
      MOCK_RU_SSH_PORT: "830"
      MOCK_RU_TLS_PORT: "6513"
      MOCK_RU_TLS_CERT_DIR: /etc/mock-ru-tls-client
      O1_ADAPTER_HOST: ocudu-o1-adapter
      O1_ADAPTER_PORT: "5000"
      CONFIG_PATH: /tmp/config.yaml
      MOCK_GNB_EVENT_LOG: /tmp/mock_gnb_events.jsonl
      MOCK_SMO_EVENT_LOG: /tmp/mock_smo_events.jsonl
      PYTEST_ADDOPTS: ${PYTEST_ADDOPTS:--vv test_o1_adapter_gnb.py}
    volumes:
      - shared-data:/tmp
      - ${O1_TEST_RESULTS_DIR:-o1-test-results}:/opt/tests/log
      # Read the netconf container's self-signed CA + client cert/key out of the
      # same named volume; the test fixture connects via mTLS using these.
      - netconf-tls-certs:/etc/netconf-tls-client:ro
      - mock-ru-tls-certs:/etc/mock-ru-tls-client:ro
    networks:
      smo:
        ipv4_address: 172.21.0.15
    profiles: ["test"]

volumes:
  shared-data:
  o1-test-results:
  netconf-tls-certs:
  mock-ru-tls-certs:

networks:
  smo:
    ipam:
      driver: default
      config:
        - subnet: 172.21.0.0/24
