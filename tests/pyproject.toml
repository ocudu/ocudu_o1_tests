[tool.pytest.ini_options]
minversion = "8.2"
addopts = [
  "-vv",
  "--maxfail=1",
  "--disable-warnings",
  "--junitxml=./log/out.xml",
]
testpaths = ["."]
junit_logging = "all"
markers = [
  "MVP-ARCH-INTF-5",
  "MVP-SEC-O-CU-05",
  "MVP-SEC-O-CU-07",
  "MVP-SEC-O-DU-03a",
]
