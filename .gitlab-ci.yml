spec:
  inputs:
    ocudu_path:
      type: string
      default: ocudu/ocudu
      description: "OCUDU repository path."
    ocudu_ref:
      type: string
      default: dev
      description: "OCUDU reference branch or tag."
---
include:
  - project: $[[ inputs.ocudu_path ]]
    ref: $[[ inputs.ocudu_ref ]]
    file: .gitlab/ci-shared/workflow.yml
  - project: $[[ inputs.ocudu_path ]]
    ref: $[[ inputs.ocudu_ref ]]
    file: .gitlab/ci-shared/static.yml
  - project: $[[ inputs.ocudu_path ]]
    ref: $[[ inputs.ocudu_ref ]]
    file: .gitlab/ci-shared/gitlab_settings/.gitlab-ci.yml
    inputs:
      ocudu_path: $[[ inputs.ocudu_path ]]
      ocudu_ref: $[[ inputs.ocudu_ref ]]

stages:
  - ci
  - compose

.o1-tests:
  - changes: &o1_test_changes
      paths:
        - .gitlab-ci.yml
        - docker-compose.yml
        - run_tests.py
        - mocks/**/*
        - tests/**/*
        - ocudu_elements/ocudu_netconf
        - ocudu_elements/ocudu_o1_adapter

.docker compose:
  stage: compose
  image: docker:24.0.7-dind
  tags:
    - ${OCUDU_RUNNER_TAG}-amd64
  timeout: 2h
  retry: 2
  variables:
    GIT_SUBMODULE_STRATEGY: recursive
  before_script: &docker_setup
    - |
      export DOCKER_HOST=unix:///var/run/docker.sock
      export DOCKER_TLS_CERTDIR=""
      dockerd-entrypoint.sh --host=${DOCKER_HOST} --tls=false 2>&1 &
    - |
      i=0
      while ! docker info >/dev/null 2>&1; do
        i=$((i+1))
        if [ "$i" -ge 60 ]; then
          echo "ERROR: dockerd not ready after 60s"
          exit 1
        fi
        sleep 1
      done
    - apk add --no-cache git python3

headers:
  stage: ci
  extends: .headers
  variables:
    IGNORE_PATH: third_party_elements/

o1 integration tests:
  extends: .docker compose
  rules:
    - if: $CI_PIPELINE_SOURCE == "pipeline"
    - if: $ON_MR
      changes:
        <<: *o1_test_changes
    - if: $ON_DEFAULT_BRANCH
      changes:
        <<: *o1_test_changes
        compare_to: "$CI_COMMIT_BEFORE_SHA"
  script:
    - |
      if [ -n "${O1_TESTS_UPSTREAM_COMPONENT:-}" ]; then
        case "$O1_TESTS_UPSTREAM_COMPONENT" in
          ocudu_netconf)
            SUBMODULE_PATH="ocudu_elements/ocudu_netconf"
            ;;
          ocudu_o1_adapter)
            SUBMODULE_PATH="ocudu_elements/ocudu_o1_adapter"
            ;;
          *)
            echo "Unsupported upstream component: $O1_TESTS_UPSTREAM_COMPONENT"
            exit 1
            ;;
        esac

        echo "Testing $O1_TESTS_UPSTREAM_COMPONENT from $O1_TESTS_UPSTREAM_PROJECT_PATH"
        echo "SHA: $O1_TESTS_UPSTREAM_SHA"
        git -C "$SUBMODULE_PATH" remote set-url origin "https://gitlab-ci-token:${CI_JOB_TOKEN}@${CI_SERVER_HOST}/${O1_TESTS_UPSTREAM_PROJECT_PATH}.git"
        git -C "$SUBMODULE_PATH" fetch --no-tags origin "$O1_TESTS_UPSTREAM_SHA"
        test "$(git -C "$SUBMODULE_PATH" rev-parse FETCH_HEAD)" = "$O1_TESTS_UPSTREAM_SHA"
        git -C "$SUBMODULE_PATH" checkout --detach "$O1_TESTS_UPSTREAM_SHA"
      fi
    - mkdir -p artifacts
    - export O1_TEST_RESULTS_DIR="${CI_PROJECT_DIR}/artifacts"
    - python3 run_tests.py
  after_script:
    - mv "${CI_PROJECT_DIR}/artifacts/out.xml" "${CI_PROJECT_DIR}/${CI_JOB_ID}_xunit.xml" || true
  artifacts:
    when: always
    reports:
      junit: ${CI_JOB_ID}_xunit.xml
    paths:
      - ${CI_JOB_ID}_xunit.xml
    expire_in: 5 days

update submodule pointer:
  stage: compose
  image:
    name: alpine/git:latest
    entrypoint: ["/bin/sh", "-c"]
  needs: ["o1 integration tests"]
  variables:
    GIT_SUBMODULE_STRATEGY: recursive
  rules:
    - if: $CI_PIPELINE_SOURCE == "pipeline" && $O1_TESTS_UPDATE_SUBMODULE == "true"
  before_script:
    - git config user.email ${O1_INTEGRATION_EMAIL}
    - git config user.name ${O1_INTEGRATION_USERNAME}
    - git remote set-url origin "https://gitlab-ci-token:${O1_INTEGRATION_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
  script:
    - |
      SUBMODULE_PATH="ocudu_elements/${O1_TESTS_UPSTREAM_COMPONENT}"
      git -C "$SUBMODULE_PATH" remote set-url origin "https://gitlab-ci-token:${O1_INTEGRATION_TOKEN}@${CI_SERVER_HOST}/${O1_TESTS_UPSTREAM_PROJECT_PATH}.git"
      git -C "$SUBMODULE_PATH" fetch origin "$O1_TESTS_UPSTREAM_SHA"
      git -C "$SUBMODULE_PATH" checkout "$O1_TESTS_UPSTREAM_SHA"
      git add "$SUBMODULE_PATH"
      git commit -s -m "git: update ${O1_TESTS_UPSTREAM_COMPONENT} submodule pointer"
      git push origin HEAD:main
